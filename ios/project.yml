name: WeddingHQ
options:
  bundleIdPrefix: com.weddinghq
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: WeddingHQ/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.weddinghq.app
    PRODUCT_NAME: WeddingHQ
    ALWAYS_SEARCH_USER_PATHS: NO
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    exactVersion: "2.46.0"
targets:
  WeddingHQ:
    type: application
    platform: iOS
    sources:
      - path: WeddingHQ
        excludes:
          - "**/Secrets.plist"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: supabase-swift
        products:
          - Supabase
    settings:
      base:
        PRODUCT_NAME: WeddingHQ
        ALWAYS_SEARCH_USER_PATHS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
schemes:
  WeddingHQ:
    build:
      targets:
        WeddingHQ: all
    run:
      config: Debug
