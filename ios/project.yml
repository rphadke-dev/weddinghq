name: WeddingHQ
options:
  bundleIdPrefix: com.weddinghq
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: WeddingHQ/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.weddinghq.app
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.20.0"
targets:
  WeddingHQ:
    type: application
    platform: iOS
    sources:
      - path: WeddingHQ
        excludes:
          - "**/Secrets.plist"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
schemes:
  WeddingHQ:
    build:
      targets:
        WeddingHQ: all
    run:
      config: Debug
